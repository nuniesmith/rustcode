# RC-CRATES-D: code_review plugin manifest
#
# Wraps the Grok xAI API via the `api` crate to perform per-file code review.
# The hook script calls the rustcode CLI which uses api::OpenAiCompatClient.

name        = "code_review"
version     = "0.1.0"
description = "LLM-powered code review tool — sends a file to Grok 4.20 and returns structured findings"
defaultEnabled = true

[[tools]]
name        = "code_review"
description = "Review a source file with Grok 4.20 multi-agent. Returns quality, security, and improvement notes."
command     = "rustcode"
args        = ["tool", "code-review"]
requiredPermission = "read-only"

[tools.inputSchema]
type = "object"
required = ["file_path"]
additionalProperties = false

  [tools.inputSchema.properties.file_path]
  type        = "string"
  description = "Relative or absolute path to the file to review"

  [tools.inputSchema.properties.model]
  type        = "string"
  description = "xAI model override (default: grok-4.20-multi-agent-0309)"

  [tools.inputSchema.properties.focus]
  type        = "string"
  description = "Optional review focus: security | quality | architecture | all (default: all)"
