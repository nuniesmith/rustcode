# cargo-deny — supply-chain + license hygiene (TODO CI-B).
#
# Complements the `cargo audit` CI job (RUSTSEC vulnerabilities) with license,
# duplicate/banned-crate, and dependency-source checks. Run locally with:
#
#     cargo deny check
#
# CI: the `deny` job in .github/workflows/ci.yml (non-blocking for now — matches
# the `audit` job; drop its `continue-on-error` to gate once the graph is clean).

[graph]
all-features = true

[advisories]
version = 2
# RUSTSEC advisory DB. `cargo audit` already surfaces vulnerabilities; this keeps
# them visible here too. Add advisory IDs to `ignore` (with a rationale) as needed.
ignore = []

[licenses]
version = 2
# Permissive licenses accepted across the dependency tree. Anything not listed
# is flagged (non-blocking) — extend deliberately as new deps appear.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "OpenSSL",
]
confidence-threshold = 0.8

[bans]
# Surface, don't fail, duplicate versions + wildcard deps for now.
multiple-versions = "warn"
wildcards = "warn"
allow-wildcard-paths = true

[sources]
# Only crates.io (+ explicitly-allowed git deps) should appear.
unknown-registry = "deny"
unknown-git = "warn"
