# =============================================================================
# rustcode — local dev stack
#
#   docker compose up --build         # build image and start everything
#   docker compose up -d              # start in background after first build
#   docker compose logs -f rustcode   # tail server logs
#   docker compose down               # stop (keeps the postgres volume)
#   docker compose down -v            # stop + wipe the postgres volume
#
# The `rustcode` service reads its config from `.env` in the project root.
# Override individual values inline (e.g. `PORT=4000 docker compose up`).
#
# The optional `openwebui` profile adds an OpenAI-compatible chat UI in front
# of the proxy:
#   docker compose --profile webui up -d
# Then browse to http://localhost:3000 and sign up locally. The model list is
# pulled from rustcode at GET /v1/models; all chat traffic routes through
# rustcode using the bearer token in OPENWEBUI_API_KEY (which must match one
# of the comma-separated keys in RUSTCODE_PROXY_API_KEYS, or both can be
# left empty for dev mode).
# =============================================================================

name: rustcode

services:
  postgres:
    image: postgres:17-alpine
    container_name: rustcode-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rustcode}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-rustcode}
    # Expose 5432 on the host so you can also connect from `psql` directly.
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - rustcode_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rustcode} -d ${POSTGRES_DB:-rustcode}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - rustcode-net

  rustcode:
    build:
      context: .
      dockerfile: Dockerfile
    image: rustcode:latest
    container_name: rustcode
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    # Anything set here wins over `.env` — we override DATABASE_URL so the
    # container talks to the `postgres` service (not `localhost`).
    environment:
      HOST: 0.0.0.0
      PORT: 3500
      DATABASE_URL: postgresql://${POSTGRES_USER:-rustcode}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-rustcode}
      RUSTASSISTANT_AUTO_MIGRATE: "true"
      REPOS_DIR: /app/repos
      RUST_LOG: ${RUST_LOG:-info,rustcode=debug,sqlx=warn}
    ports:
      - "${RUSTCODE_HOST_PORT:-3500}:3500"
    volumes:
      # Persist indexed repos and per-repo `.rustcode/` caches across restarts.
      - rustcode_repos:/app/repos
      # Drop task JSON files in ./tasks on the host; the watcher picks them up.
      - ./tasks:/app/tasks
      # Misc app data (token costs, local SQLite snapshots if any).
      - rustcode_data:/app/data
    networks:
      - rustcode-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3500/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  # OpenWebUI sidecar — OpenAI-compatible chat UI in front of the rustcode
  # proxy. Gated behind the `webui` profile so it's opt-in:
  #
  #   docker compose --profile webui up -d
  #
  # Pulls the model list from rustcode at `GET /v1/models` and routes all
  # chat through `POST /v1/chat/completions`. No code changes needed on the
  # rustcode side — rustcode is already OpenAI-compatible.
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: rustcode-openwebui
    restart: unless-stopped
    profiles: ["webui"]
    depends_on:
      rustcode:
        condition: service_healthy
    environment:
      # Point OpenWebUI at the rustcode service on the shared network.
      OPENAI_API_BASE_URL: http://rustcode:3500/v1
      # Bearer token sent on every request. Must match one of the keys in
      # `RUSTCODE_PROXY_API_KEYS` (or both can be empty for dev-mode auth
      # bypass). OpenWebUI requires *some* non-empty value here even when
      # the upstream has auth disabled — use any placeholder string.
      OPENAI_API_KEY: ${OPENWEBUI_API_KEY:-placeholder-dev-key}
      # Disable WebUI's own model download (we serve via rustcode only).
      ENABLE_OLLAMA_API: "false"
    ports:
      - "${OPENWEBUI_HOST_PORT:-3000}:8080"
    volumes:
      - rustcode_openwebui:/app/backend/data
    networks:
      - rustcode-net

volumes:
  rustcode_pgdata:
  rustcode_repos:
  rustcode_data:
  rustcode_openwebui:

networks:
  rustcode-net:
    driver: bridge
