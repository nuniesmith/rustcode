# RC-CRATES-D: todo_scan plugin manifest
#
# Uses runtime::glob_search to find TODO/FIXME/HACK markers across the repo,
# then ranks them by priority using the existing TodoScanner logic.

name        = "todo_scan"
version     = "0.1.0"
description = "Scan a repository for TODO/FIXME/HACK markers and produce a prioritised task list"
defaultEnabled = true

[[tools]]
name        = "todo_scan"
description = "Scan the current workspace for TODO markers. Returns a prioritised JSON list."
command     = "rustcode"
args        = ["tool", "todo-scan"]
requiredPermission = "read-only"

[tools.inputSchema]
type = "object"
required = []
additionalProperties = false

  [tools.inputSchema.properties.path]
  type        = "string"
  description = "Root path to scan (defaults to current directory)"

  [tools.inputSchema.properties.include_fixme]
  type        = "boolean"
  description = "Include FIXME markers (default: true)"

  [tools.inputSchema.properties.include_hack]
  type        = "boolean"
  description = "Include HACK markers (default: true)"

  [tools.inputSchema.properties.max_results]
  type        = "integer"
  minimum     = 1
  description = "Maximum number of results to return (default: 50)"
