# CI — format, lint, test, and build the rustcode workspace.
#
# Why this exists
# ---------------
# The async task agent's auto-merge path (`automerge.rs`) gates on "CI checks
# passing", but the repository had NO CI at all until this workflow. These jobs
# give that gate something real to wait on. (Tracked as CI-A in TODO.md.)
#
# Design notes
# ------------
#   * Build needs NO database. sqlx is used in *runtime* mode here — there are
#     no `query!`/`query_as!` compile-time macros and no committed `.sqlx`
#     cache — so `cargo build` resolves without DATABASE_URL. Only tests that
#     open a PgPool need Postgres; those run in a follow-up DB job (CI-A.2).
#   * The `rustcode` and `rag` crates pull `fastembed -> ort -> ort-sys`, which
#     downloads an ONNX Runtime binary at build time. The `build` job compiles
#     the full workspace, but is marked `continue-on-error` (non-blocking) until
#     the ort download is proven reliable on GitHub runners — the CDN returns
#     403 to some cloud IPs. Tracked as CI-A.2. `fmt` / `clippy` / `test` scope
#     to the leaf crates so they stay green even where the ort CDN is blocked.
#   * The blocking `test` job runs only crates whose suites are deterministic
#     and environment-independent. The non-blocking `test-extended` job runs
#     `tools`, `runtime`, and `rusty-claude-cli`, whose tests depend on the
#     environment (loopback HTTP a proxy can intercept, a process-global env
#     lock, integration servers). Hardening them to block is tracked as CI-A.4.
#   * Cargo.lock is gitignored, so `--locked` is intentionally NOT used;
#     CI resolves a fresh lockfile each run.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy (leaf crates)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # rustcode + rag are excluded here (ONNX runtime); they are compile-checked
      # by the `build` job.
      #
      # NOTE: intentionally NOT `-D warnings`. The workspace opts into
      # clippy::pedantic + nursery at `warn` level (see [workspace.lints] in
      # Cargo.toml) and carries a large pre-existing warning backlog. This job
      # surfaces lints in the log and fails only on hard errors. Burning down
      # the backlog and tightening to `-D warnings` is tracked as a follow-up
      # (TODO: CI-A).
      - run: cargo clippy --workspace --exclude rustcode --exclude rag --all-targets

  test:
    name: test (${{ matrix.crate }})
    runs-on: ubuntu-latest
    # Blocking gate, fanned out per crate so a failing crate names itself in the
    # check title (e.g. `test (api)`). `fail-fast: false` runs every crate even
    # when one fails. The two ONNX crates (rustcode, rag) compile in `build`; the
    # three environment-sensitive crates (tools, runtime, rusty-claude-cli) run
    # in the non-blocking `test-extended` job below. Network/API-key tests are
    # #[ignore]'d in-tree; Postgres tests live in rustcode (DB job, CI-A.2).
    strategy:
      fail-fast: false
      matrix:
        crate:
          - api
          - commands
          - compat-harness
          - github-client
          - mock-anthropic-service
          - plugins
          - telemetry
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p ${{ matrix.crate }}

  test-extended:
    name: test-extended (env-sensitive, non-blocking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Non-blocking via step-level continue-on-error → the job stays GREEN even
      # when these fail (job-level continue-on-error would still report a failed
      # check). These suites depend on the runner environment (loopback HTTP a
      # proxy can intercept, a process-global env lock, integration servers).
      # Run for visibility; promoting them into the blocking `test` job once
      # hardened is tracked as CI-A.4.
      - run: cargo test -p tools -p runtime -p rusty-claude-cli
        continue-on-error: true

  build:
    name: build (full workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Non-blocking until ort-on-CI is proven, via step-level continue-on-error
      # → the job stays GREEN even when the build fails (job-level would still
      # report a failed check). `ort-sys` downloads an ONNX Runtime binary from a
      # CDN at build time, which returns 403 to some cloud IPs. This job proves
      # the main binary builds (something no ort-blocked sandbox can verify), but
      # must not block the gate while that download is unproven. Tracked CI-A.2.
      - run: cargo build --workspace
        continue-on-error: true
